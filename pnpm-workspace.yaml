# Career-pilot extension to NanoClaw upstream (2nd deliberate deviation —
# upstream config-only, no `packages:`). The agent-runner has its own dep
# tree with bun-specific types; declaring it as a workspace lets a single
# root `pnpm install` populate both trees, and `pnpm -r typecheck` covers
# both. Phase 5 will add `frontend` here when TanStack Start lands.
# See .specs/NANOCLAW_INTERNALS.md §11 deltas for the upstream-deviation
# tracking convention.
packages:
  - container/agent-runner

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - protobufjs
  - sharp

pnpm:
  minimumReleaseAge: 4320
