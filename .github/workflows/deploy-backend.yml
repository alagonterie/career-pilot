name: deploy-backend

# Phase 9.2 (STRATEGY.md §24.39). Codified provisioning of the isolated dev
# backend stack on the shared GCP host. Auth GH -> GCP via Workload Identity
# Federation (the deploy SA), reach the host over the IAP TCP tunnel (the only
# SSH path the firewall allows), clone/pull the `dev` branch into
# /opt/career-pilot-dev, and run the idempotent scripts/bootstrap-vm.sh as the
# unprivileged `career-pilot` service user. Per-env config comes from the GitHub
# `dev` Environment (vars + secrets) so real tokens never enter the repo.
#
# Trigger: push to `dev` (backend-affecting paths) auto-provisions the dev
# backend; the bootstrap is idempotent and gated by a portal smoke check.
# workflow_dispatch stays for manual/ad-hoc redeploys.
on:
  workflow_dispatch: {}
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'container/**'
      - 'setup/**'
      - 'scripts/**'
      - 'config/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false # never interrupt an in-flight provision

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Provision dev backend over IAP SSH
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }} # short-lived; used only to clone the private repo onto the box
          VM_NAME: ${{ vars.GCP_VM_NAME || 'career-pilot-host' }}
          VM_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT || 'career-pilot-497319' }}
          # Per-env tunables (GitHub Environment vars) with safe fallbacks.
          CP_ASSISTANT_NAME: ${{ vars.CP_ASSISTANT_NAME || 'Career Pilot' }}
          CP_TZ: ${{ vars.CP_TZ || 'America/Chicago' }}
          # Secrets (GitHub Environment secrets) — GH masks these in logs.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_DEV_BOT_TOKEN }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # cloudflared tunnel token (the Terraform `dev_tunnel_token` output);
          # empty until the edge is applied + the secret set — the install step
          # below no-ops while unset.
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_DEV_TUNNEL_TOKEN }}
          # Tailscale auth key (owner-generated, reusable, pre-authorized) — joins
          # the VM to the owner's tailnet for direct access to VM-local services
          # + agent debugging (§24.41). Empty until the owner generates a key +
          # sets the secret — the install step below no-ops while unset.
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          # The public api host for the edge smoke. A GH `dev` env VARIABLE (not
          # committed) — the real apex stays out of the generic/forkable repo,
          # like the other env-specific values. The edge smoke no-ops if unset.
          API_HOST: ${{ vars.API_HOST }}
          # Service-token creds (GH `dev` secrets) so the edge smoke reaches the
          # backend THROUGH Access+tunnel (a token-authed 200), instead of only
          # seeing the Access challenge (302) — which masks a dead tunnel (1033).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          # Build the remote orchestration script on the runner (secrets get
          # interpolated here, then it travels over the encrypted SSH channel as
          # `bash -s` STDIN — so secrets never land in argv on either side).
          # Remote-only expansions (clone URL, the service user's uid) are
          # escaped (\$) to defer to the box.
          cat > /tmp/cp-remote.sh <<EOF
          set -euo pipefail
          REPO=${GH_REPO}
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/\${REPO}.git"
          CLEAN_URL="https://github.com/\${REPO}.git"

          # Ensure the checkout dir exists + is owned by the service user.
          sudo install -d -o career-pilot -g career-pilot /opt/career-pilot-dev

          # Clone-or-pull the dev branch as the service user.
          if sudo -u career-pilot test -d /opt/career-pilot-dev/.git; then
            sudo -u career-pilot git -C /opt/career-pilot-dev remote set-url origin "\${AUTH_URL}"
            sudo -u career-pilot git -C /opt/career-pilot-dev fetch --depth=1 origin dev
            sudo -u career-pilot git -C /opt/career-pilot-dev reset --hard origin/dev
          else
            sudo -u career-pilot git clone --depth=1 --branch dev "\${AUTH_URL}" /opt/career-pilot-dev
          fi
          # Scrub the token from the stored remote — never leave it on disk.
          sudo -u career-pilot git -C /opt/career-pilot-dev remote set-url origin "\${CLEAN_URL}"

          # Host toolchain ensure (idempotent; privileged as the deploy SA — the
          # unprivileged service user has no sudo). cloud-init lays only the OS
          # baseline; Node 20 + pnpm 10 land here so the step is re-runnable +
          # self-healing (the live VM first came up with the distro's Node 18,
          # too old for the host tree).
          NODE_MAJOR=\$(node -v 2>/dev/null | cut -d. -f1 | tr -d v)
          if [ "\${NODE_MAJOR:-0}" -lt 20 ]; then
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          sudo npm install -g pnpm@10
          # Ubuntu's docker.io ships a bare engine — install the Docker plugins
          # the stack needs: buildx (the agent image's RUN --mount=type=cache
          # BuildKit steps) + compose (OneCLI's gateway is a docker-compose stack).
          sudo apt-get update -qq
          sudo apt-get install -y docker-buildx docker-compose-v2

          # cloudflared tunnel daemon — the dev backend's SOLE ingress (the VM
          # has no inbound ports). Remotely-managed: ingress rules live in
          # Cloudflare (Terraform infra/tunnel.tf); the daemon needs only the
          # token. Idempotent; no-ops when the secret is unset (edge not yet
          # applied). Token reaches the installer via env (the same channel as
          # the other deploy secrets), then lands in a root-only env-file.
          if [ -n '${CLOUDFLARED_TOKEN}' ]; then
            sudo env CLOUDFLARED_TOKEN='${CLOUDFLARED_TOKEN}' bash /opt/career-pilot-dev/scripts/install-tunnel.sh
          else
            echo "CLOUDFLARED_DEV_TUNNEL_TOKEN unset — skipping tunnel daemon install"
          fi

          # Tailscale — join the VM to the owner's tailnet for direct access to
          # VM-local services + agent debugging (§24.41). Additive to the
          # cloudflared edge; preserves no-public-inbound (outbound join only).
          # Idempotent; no-ops when the auth key is unset.
          if [ -n '${TAILSCALE_AUTHKEY}' ]; then
            sudo env TAILSCALE_AUTHKEY='${TAILSCALE_AUTHKEY}' bash /opt/career-pilot-dev/scripts/install-tailscale.sh
          else
            echo "TAILSCALE_AUTHKEY unset — skipping Tailscale join"
          fi

          # A persistent user-systemd session so the service survives logout/reboot.
          sudo loginctl enable-linger career-pilot
          CP_UID=\$(id -u career-pilot)

          # Run the idempotent bootstrap as the service user (one line — \`env\`
          # guarantees the vars reach the script regardless of sudo's env policy;
          # single-quoted values survive spaces; \${CP_UID} defers to the box).
          sudo -u career-pilot env XDG_RUNTIME_DIR=/run/user/\${CP_UID} DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/\${CP_UID}/bus CP_ENVIRONMENT=dev CP_PORTAL_API_PORT=3002 CP_WEBHOOK_PORT=3001 CP_ASSISTANT_NAME='${CP_ASSISTANT_NAME}' CP_TZ='${CP_TZ}' TELEGRAM_BOT_TOKEN='${TELEGRAM_BOT_TOKEN}' PORTKEY_API_KEY='${PORTKEY_API_KEY}' ANTHROPIC_API_KEY='${ANTHROPIC_API_KEY}' bash /opt/career-pilot-dev/scripts/bootstrap-vm.sh

          # Post-bootstrap smoke check — the portal API answering proves the host
          # process is up and serving (give it a moment to bind the port). On
          # failure, dump host diagnostics (no local SSH available to debug).
          echo "== smoke: portal /api/system-status =="
          ok=0
          for i in \$(seq 1 12); do
            if curl -fsS -m 5 http://127.0.0.1:3002/api/system-status; then echo; echo "portal-ok"; ok=1; break; fi
            sleep 3
          done
          if [ "\$ok" -ne 1 ]; then
            echo "== portal DOWN — diagnostics =="
            sudo -u career-pilot env XDG_RUNTIME_DIR=/run/user/\${CP_UID} systemctl --user status nanoclaw-v2-365449e3 --no-pager -l 2>&1 | tail -n 30 || true
            echo "== nanoclaw.error.log (tail 60) =="
            sudo tail -n 60 /opt/career-pilot-dev/logs/nanoclaw.error.log 2>&1 || true
            echo "== nanoclaw.log (tail 60) =="
            sudo tail -n 60 /opt/career-pilot-dev/logs/nanoclaw.log 2>&1 || true
            exit 1
          fi

          # Edge smoke (only when the tunnel is configured): the PUBLIC api host
          # should answer THROUGH the tunnel with an Access challenge (302/401/
          # 403) — proving DNS + tunnel + Access are all up — and NOT a 5xx/000
          # (tunnel down) or 404 (missing ingress). We can't fetch the backend
          # JSON here (the runner holds no Access cookie); the authenticated
          # browser path is the D9 owner verify.
          if [ -n '${CLOUDFLARED_TOKEN}' ] && [ -n '${API_HOST}' ] && [ -n '${CF_ACCESS_CLIENT_ID}' ]; then
            echo "== smoke: edge https://${API_HOST}/api/system-status via service token (expect 200) =="
            edge_ok=0
            for i in \$(seq 1 10); do
              code=\$(curl -s -o /dev/null -m 8 -w '%{http_code}' \
                -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
                -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
                "https://${API_HOST}/api/system-status" || echo 000)
              echo "  attempt \$i: HTTP \$code"
              case "\$code" in
                200) echo "edge-ok (service token reached the backend through the tunnel)"; edge_ok=1; break ;;
                530) echo "  (530/1033 = tunnel not connected; retrying)" ;;
                302|401|403) echo "  (\$code = Access rejected the service token; retrying)" ;;
              esac
              sleep 6
            done
            if [ "\$edge_ok" -ne 1 ]; then
              echo "== edge DOWN — cloudflared diagnostics =="
              sudo systemctl status cloudflared-dev --no-pager -l 2>&1 | tail -n 30 || true
              sudo journalctl -u cloudflared-dev --no-pager -n 40 2>&1 || true
              exit 1
            fi
          fi
          EOF

          gcloud compute ssh "${VM_NAME}" \
            --project "${GCP_PROJECT}" \
            --zone "${VM_ZONE}" \
            --tunnel-through-iap \
            --quiet \
            --command="bash -s" < /tmp/cp-remote.sh

          rm -f /tmp/cp-remote.sh
