name: Deploy Backend to GCP

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Files to GCP VM via gcloud compute scp
        run: |
          gcloud compute scp --quiet --recurse backend/ --zone=${{ secrets.GCP_ZONE }} hire-backend-orchestrator:~/backend

      - name: Restart Services via SSH
        run: |
          gcloud compute ssh --quiet hire-backend-orchestrator --zone=${{ secrets.GCP_ZONE }} --command="
            if [ ! -f /var/lib/google/docker-compose ] || ! /var/lib/google/docker-compose version >/dev/null 2>&1; then
              sudo mkdir -p /var/lib/google && \
              sudo curl -L \"https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64\" -o /var/lib/google/docker-compose && \
              sudo chmod +x /var/lib/google/docker-compose;
            fi && \
            sudo mkdir -p /home/app && \
            sudo chown -R \$USER:\$USER /home/app && \
            rm -rf /home/app/backend && \
            mv ~/backend /home/app/backend && \
            cd /home/app/backend && \
            export PORTKEY_API_KEY='${{ secrets.PORTKEY_API_KEY }}' && \
            /var/lib/google/docker-compose -f docker-compose.prod.yml down && \
            /var/lib/google/docker-compose -f docker-compose.prod.yml up -d --build
          "
