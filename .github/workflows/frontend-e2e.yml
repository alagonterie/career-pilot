name: frontend-e2e

# Full-stack frontend E2E (STRATEGY.md §24.23, Sub-milestone 6.0). Boots the
# real native-http portal API against a seeded in-memory DB + the built
# frontend, and drives headless Chromium against the pair. No Docker, no LLM ->
# deterministic + free. The @visual pixel-regression spec is skipped here:
# screenshot baselines are OS-specific and committed on the dev OS; the semantic
# + a11y E2E is the cross-platform gate.
on:
  push:
    paths:
      - 'frontend/**'
      - 'scripts/portal-e2e-server.ts'
      - 'src/modules/portal/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/portal-e2e-server.ts'
      - 'src/modules/portal/**'

# Rapid successive pushes to the same ref (the common spec→build→fix cadence)
# cancel the stale e2e run instead of each running to completion — only the
# latest commit is worth validating. Mirrors deploy-frontend's cancel-in-progress
# so the e2e gate and the deploy always reflect the same (latest) commit. The
# single biggest GitHub-Actions-minute saver here (a whole redundant run, vs the
# seconds an install tweak shaves).
concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Cloudflare Worker runtime types (declares the
      # `cloudflare:workers` virtual module the BFF route imports). Generated,
      # not committed (gitignored) — regenerated here so `tsc --noEmit` resolves
      # it. The deploy path doesn't need this (vite's CF plugin resolves it at
      # build); only the standalone typecheck does.
      - name: Generate Cloudflare worker types
        run: pnpm --filter @career-pilot/frontend cf-typegen
      - name: Typecheck frontend
        run: pnpm --filter @career-pilot/frontend typecheck
      # Cache the downloaded browser binary (~120MB) across runs, keyed on the
      # lockfile (a Playwright bump changes the lock → cache invalidates → the
      # matching browser is re-fetched). The `--with-deps` apt step below still
      # runs (system libs aren't cacheable this way), but the download is skipped
      # on a hit. A pre-baked Playwright container would also skip apt, but at the
      # cost of a ~1.5GB image pull + the image's pinned Node — not worth it here.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium
        run: pnpm --filter @career-pilot/frontend exec playwright install --with-deps chromium
      - name: Frontend E2E (semantic + a11y)
        run: pnpm --filter @career-pilot/frontend exec playwright test --grep-invert @visual
