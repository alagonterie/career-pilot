name: deploy-frontend

# Phase 9.1 (STRATEGY.md §24.38). Branch -> environment:
#   push to `dev`    -> CLOUDFLARE_ENV=dev build -> wrangler deploy (career-pilot-portal-dev)
#   push to `master` -> top-level (prod) build   -> wrangler deploy (career-pilot-portal)
# The @cloudflare/vite-plugin selects the Cloudflare environment at BUILD time
# via CLOUDFLARE_ENV; `wrangler deploy` then ships the flattened build (the
# --env flag is a no-op with the plugin). The dev frontend's custom-domain
# binding + the owner-only Cloudflare Access gate are Terraform-managed
# (infra/), applied out-of-band, not in this workflow.
on:
  workflow_dispatch: {} # manual/ad-hoc deploy of the current ref
  push:
    branches: [dev, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Environment carries the per-env vars/secrets (VITE_API_BASE, the
    # build-time site identity) so real hostnames/identity never enter the repo.
    environment: ${{ github.ref_name == 'master' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags + full history visible to `git describe` (the §24.139 version chip)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build + deploy (${{ github.ref_name }})
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          # Per-deployment site identity (STRATEGY §24.71 9.4b-3): the fork's repo
          # URL ("view source" links) + the public origin (absolute og: URLs).
          # Real hostnames live in the GH Environment vars (never the repo); unset
          # falls back to the committed generic janedoe/example.com placeholders.
          # (Per-CANDIDATE identity — email, socials — is DB-sourced via /api/profile.)
          VITE_REPO_URL: ${{ vars.VITE_REPO_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          # The header brand wordmark (the candidate's name). GH env var; unset →
          # the committed generic `Jane Doe` placeholder.
          VITE_PERSON_NAME: ${{ vars.VITE_PERSON_NAME }}
          # BFF Worker bindings (STRATEGY §24.39 D12): with VITE_API_BASE empty the
          # browser calls /api/* SAME-ORIGIN; the Worker proxies to the tunnel host
          # using an Access service token. Injected post-deploy as Worker secrets.
          BACKEND_API_BASE: ${{ vars.BACKEND_API_BASE }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          # Abuse-hardening (STRATEGY §24.70 / 9.4a). VITE_TURNSTILE_SITE_KEY is a
          # build-time client var (the site key is public). Dev defaults to the
          # always-pass TEST key below; prod sets a real GH env var. The prod
          # Worker secret/hostname are injected post-deploy (dev uses the committed
          # env.dev.vars test secret, so these stay empty on dev).
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          TURNSTILE_HOSTNAME: ${{ vars.TURNSTILE_HOSTNAME }}
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then export CLOUDFLARE_ENV=dev; fi
          # Dev's client widget uses the always-pass Turnstile TEST site key (D5)
          # unless the GH dev env overrides it; prod must set a real GH env var.
          if [ "${{ github.ref_name }}" = "dev" ] && [ -z "$VITE_TURNSTILE_SITE_KEY" ]; then
            export VITE_TURNSTILE_SITE_KEY=1x00000000000000000000AA
          fi
          # Product version chip (STRATEGY §24.139 D4-4). master → the nearest v*
          # tag (a release-tag link when HEAD is exactly that tag, else the commit
          # — an honest "N commits past the last release"); pre-first-tag → the
          # short SHA. dev → `dev · <sha>` linking the commit. Vite inlines the
          # VITE_-prefixed exports the same way the vars above are consumed; unset
          # elsewhere → the frontend falls back to a deterministic link-free `dev`.
          SHA_FULL="$(git rev-parse HEAD)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          if [ "${{ github.ref_name }}" = "master" ]; then
            TAG="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"
            EXACT="$(git tag --points-at HEAD --list 'v*' | head -n1)"
            if [ -n "$EXACT" ]; then
              export VITE_APP_VERSION="$EXACT"
              export VITE_APP_VERSION_REF="releases/tag/$EXACT"
            elif [ -n "$TAG" ]; then
              export VITE_APP_VERSION="$TAG"
              export VITE_APP_VERSION_REF="commit/$SHA_FULL"
            else
              export VITE_APP_VERSION="$SHA_SHORT"
              export VITE_APP_VERSION_REF="commit/$SHA_FULL"
            fi
          else
            export VITE_APP_VERSION="dev · $SHA_SHORT"
            export VITE_APP_VERSION_REF="commit/$SHA_FULL"
          fi
          echo "Version chip: $VITE_APP_VERSION ($VITE_APP_VERSION_REF)"
          pnpm exec vite build
          pnpm exec wrangler deploy
          # Push the BFF bindings onto the deployed Worker (idempotent; persists
          # across deploys). Guarded — a no-op until all three are configured, so
          # this stays safe before the service token exists.
          WORKER_NAME="career-pilot-portal"
          if [ "${{ github.ref_name }}" = "dev" ]; then WORKER_NAME="career-pilot-portal-dev"; fi
          if [ -n "$BACKEND_API_BASE" ] && [ -n "$CF_ACCESS_CLIENT_ID" ] && [ -n "$CF_ACCESS_CLIENT_SECRET" ]; then
            printf '{"BACKEND_API_BASE":"%s","CF_ACCESS_CLIENT_ID":"%s","CF_ACCESS_CLIENT_SECRET":"%s"}' \
              "$BACKEND_API_BASE" "$CF_ACCESS_CLIENT_ID" "$CF_ACCESS_CLIENT_SECRET" \
              | pnpm exec wrangler secret bulk --name "$WORKER_NAME"
            echo "BFF Worker bindings injected for $WORKER_NAME"
          else
            echo "BFF Worker bindings not configured yet — skipping (proxy returns 503 until set)"
          fi
          # Turnstile prod secret/hostname (§24.70). Dev relies on the committed
          # env.dev.vars test secret, so TURNSTILE_SECRET is empty there and this
          # is a no-op; prod injects the real values when the GH env provides them.
          if [ -n "$TURNSTILE_SECRET" ]; then
            printf '{"TURNSTILE_SECRET":"%s","TURNSTILE_HOSTNAME":"%s"}' \
              "$TURNSTILE_SECRET" "$TURNSTILE_HOSTNAME" \
              | pnpm exec wrangler secret bulk --name "$WORKER_NAME"
            echo "Turnstile Worker secrets injected for $WORKER_NAME"
          fi
